{% block rdvs %}
<div class="rdv-container">
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Heure d'arrivée</th>
                <th>Entreprise</th>
            </tr>
        </thead>
        <tbody>                  
            {% for rdv in rdvs %}
                <tr>
                    <td>{{ rdv.date }}</td>
                    <td>{{ rdv.time }}</td>
                    <td>{{ rdv.entreprise }}</td>
                    <td><span class="delete-rdv" rdv-id="{{ rdv.id }}">🗑️</span></td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
